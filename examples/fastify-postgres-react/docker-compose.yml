services:
  postgres:
    extends:
      file: ../compose/databases/postgres.yml
      service: postgres
    container_name: fastify-postgres-db
    ports:
      - '${FASTIFY_POSTGRES_HOST_PORT:-5433}:5432'

  backend:
    build:
      context: ../..
      dockerfile: examples/Dockerfile
      args:
        EXAMPLE: fastify-postgres-react
        DATABASE_DRIVER: pg
        BACKEND: apps/backend
        FRONTEND: apps/frontend
        PORT: 8083
    image: zacatl-fastify-postgres
    container_name: fastify-postgres-backend
    ports:
      - '8083:8083'
    environment:
      - NODE_ENV=production
      - PORT=8083
      - DATABASE_URL=postgres://local:local@postgres:5432/appdb
      - HEALTHCHECK_PATH=/api/greetings
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          '/nodejs/bin/node',
          '-e',
          "const path=process.env.HEALTHCHECK_PATH||'/greetings'; const url=`http://127.0.0.1:$${process.env.PORT || '8083'}$${path}`; const controller=new AbortController(); const timer=setTimeout(() => controller.abort(), 4000); fetch(url, { signal: controller.signal }).then((r) => { clearTimeout(timer); if (!r.ok) process.exit(1); }).catch(() => process.exit(1));",
        ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

volumes:
  postgres-data:
