services:
  backend:
    build:
      context: ../..
      dockerfile: examples/Dockerfile
      args:
        EXAMPLE: express-sqlite-react
        BACKEND: apps/backend
        FRONTEND: apps/frontend
        PORT: 8181
    image: zacatl-express-sqlite
    container_name: express-sqlite-backend
    ports:
      - '8181:8181'
    environment:
      - NODE_ENV=production
      - PORT=8181
      - DATABASE_URL=sqlite:database.sqlite
    volumes:
      - ./data:/app/data
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://localhost:8181/api/greetings').catch(() => process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

volumes:
  data:
