services:
  backend:
    extends:
      file: ../compose/databases/sqlite.yml
      service: backend
    build:
      context: ../..
      dockerfile: examples/Dockerfile
      args:
        EXAMPLE: fastify-sqlite-react
        DATABASE_DRIVER: sqlite3
        BACKEND: apps/backend
        FRONTEND: apps/frontend
        PORT: 8081
    image: zacatl-fastify-sqlite-react
    container_name: fastify-sqlite-backend
    ports:
      - '8081:8081'
    environment:
      NODE_ENV: production
      PORT: 8081
      HEALTHCHECK_PATH: /api/greetings
    volumes:
      - ${ZACATL_EXAMPLE_SQLITE_DATA_DIR:-./data}:/app/data
    healthcheck:
      test:
        [
          'CMD',
          '/nodejs/bin/node',
          '-e',
          "const path=process.env.HEALTHCHECK_PATH||'/greetings'; const url=`http://127.0.0.1:$${process.env.PORT || '8081'}$${path}`; const controller=new AbortController(); const timer=setTimeout(() => controller.abort(), 4000); fetch(url, { signal: controller.signal }).then((r) => { clearTimeout(timer); if (!r.ok) process.exit(1); }).catch(() => process.exit(1));",
        ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
