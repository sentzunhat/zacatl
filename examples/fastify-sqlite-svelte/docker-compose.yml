services:
  backend:
    build:
      context: ../..
      dockerfile: examples/Dockerfile
      args:
        EXAMPLE: fastify-sqlite-svelte
        BACKEND: apps/backend
        FRONTEND: apps/frontend
        PORT: 8081
    image: zacatl-fastify-sqlite-svelte
    container_name: fastify-sqlite-svelte-backend
    ports:
      - '8085:8081'
    environment:
      - NODE_ENV=production
      - PORT=8081
      - DATABASE_URL=sqlite:database.sqlite
    volumes:
      - ./data:/app/data
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://localhost:8081/api/greetings').catch(() => process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

volumes:
  data:
