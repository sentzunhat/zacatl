name: Peer install check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

jobs:
  peer-install:
    name: Install peers and verify imports
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install devDependencies
        run: npm ci

      - name: Install peerDependencies declared in package.json
        run: npx tsx scripts/dev/install-peers.ts

      - name: Verify peers can be imported
        run: npx tsx scripts/dev/check-peers.ts
