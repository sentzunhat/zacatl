name: Release

# Runs on `v*` tags (created by the Tag Release workflow when a PR merges
# to `main`, or dispatched by it explicitly since GITHUB_TOKEN-pushed tags
# don't re-trigger workflows). Full verification chain, provenance-signed
# npm publish, then a GitHub Release with notes from docs/changelog.md.
#
# Requires the `NPM_TOKEN` repository secret — an npm *automation* token
# scoped to publish @sentzunhat/zacatl (Settings -> Secrets -> Actions).

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write # create the GitHub Release
  id-token: write # npm --provenance attestation

jobs:
  cve-scan:
    name: CVE scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '26.3.0'
          cache: 'npm'

      - name: Scan dependencies for vulnerabilities
        shell: bash
        run: |
          set -uo pipefail
          failed=0
          scanned=0
          mkdir -p scan-results

          while IFS= read -r -d '' lockfile; do
            dir=$(dirname "$lockfile")
            safe_name=$(printf '%s' "$dir" | sed 's#^\./##; s#[^A-Za-z0-9._-]#_#g')
            report="scan-results/${safe_name:-root}.log"
            scanned=$((scanned + 1))

            echo "Scanning: $dir"
            if npx --yes cve-lite-cli@1.27.0 "$dir" --fail-on high 2>&1 | tee "$report"; then
              echo "✅ $dir"
            else
              echo "❌ $dir"
              failed=1
            fi
          done < <(find . -name 'package-lock.json' -not -path '*/node_modules/*' -print0)

          [ "$scanned" -eq 0 ] && echo "No package-lock.json found." && exit 1
          [ "$failed" -ne 0 ] && exit 1
          echo "🎉 CVE scan passed."

      - name: Upload CVE-Lite reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cve-lite-reports
          path: scan-results/
          if-no-files-found: error

  release:
    name: Verify and publish
    runs-on: ubuntu-latest
    needs: [cve-scan]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '26.3.0'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Verify tag matches package.json version
        run: |
          PKG_VERSION="$(node -p "require('./package.json').version")"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "Ref $GITHUB_REF_NAME does not match package.json version $PKG_VERSION" >&2
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      # NPM_TOKEN is scoped to the publish step only — the verification chain
      # (tests, lint, build) runs arbitrary project code and must not see it.
      - name: Verify
        env:
          NODE_ENV: test
          ENV: test
        run: npm run publish:ci:verify

      - name: Publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish ./publish --access public --tag latest --provenance

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          awk "/^## \[${GITHUB_REF_NAME#v}\]/{flag=1; next} /^## \[/{flag=0} flag" docs/changelog.md > /tmp/release-notes.md
          if [ ! -s /tmp/release-notes.md ]; then
            echo "No changelog section found for ${GITHUB_REF_NAME} — using generated notes." >&2
            gh release create "${GITHUB_REF_NAME}" --generate-notes
          else
            gh release create "${GITHUB_REF_NAME}" --notes-file /tmp/release-notes.md --title "${GITHUB_REF_NAME}"
          fi
