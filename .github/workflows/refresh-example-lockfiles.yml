name: Refresh example lockfiles

on:
  push:
    branches:
      - stability/review-20260628-2340

permissions:
  contents: write

jobs:
  refresh-lockfiles:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: stability/review-20260628-2340
      - uses: actions/setup-node@v4
        with:
          node-version: '26.3.0'
          cache: 'npm'
          cache-dependency-path: |
            examples/**/package-lock.json
      - name: Refresh example package locks
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r -d '' lockfile; do
            dir=$(dirname "$lockfile")
            (
              cd "$dir"
              npm install --package-lock-only --ignore-scripts --no-audit --no-fund
            )
          done < <(find examples -name package-lock.json -not -path '*/node_modules/*' -print0)
      - name: Commit refreshed lockfiles
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- 'examples/**/package-lock.json'; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- 'examples/**/package-lock.json'
          git commit -m "chore: refresh example dependency lockfiles"
          git push origin HEAD:stability/review-20260628-2340
